<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TITLE}}</title>

  <!-- 字体 -->
  <style>
    @font-face {
      font-family: 'TsangerJinKai02';
      src: url('{{FONT_PATH}}fonts/TsangerJinKai02-W04.ttf') format('truetype');
      font-weight: 400 500;
      font-style: normal;
    }
    @font-face {
      font-family: 'ChaoXianRiBaoMingChao';
      src: url('{{FONT_PATH}}fonts/ChaoXianRiBaoMingChaoTi-2.ttf') format('truetype');
      font-weight: 400 500;
      font-style: normal;
    }
  </style>

  <!-- 主题样式 -->
  <style>
    {{THEME_STYLE}}
  </style>

  <!-- Squircle 圆角 -->
  <script type="module">
    import { getSvgPath } from 'https://cdn.jsdelivr.net/npm/figma-squircle@1/+esm';
    window.__applySquircle = () => {
      const sel = '.data-card, .quote-block, .code-block';
      document.querySelectorAll(sel).forEach(el => {
        const r = parseFloat(getComputedStyle(el).borderRadius) || 12;
        el.style.clipPath = `path('${getSvgPath({
          width: el.clientWidth, height: el.clientHeight,
          cornerRadius: Math.min(r, el.clientWidth/3, el.clientHeight/3),
          cornerSmoothing: 1, preserveSmoothing: true
        })}')`;
      });
    };
  </script>
</head>
<body>
  <div class="slides-container">
    {{SLIDES_CONTENT}}
  </div>

  <script>
    // 幻灯片导航
    (function() {
      const slides = document.querySelectorAll('.slide');
      let currentIndex = 0;
      const totalSlides = slides.length;

      function showSlide(index) {
        slides.forEach((slide, i) => {
          slide.classList.remove('active');
          if (i === index) {
            slide.classList.add('active');
          }
        });
      }

      // 初始化显示第一页
      showSlide(0);

      // Squircle 圆角
      if (window.__applySquircle) window.__applySquircle();

      // 点击导航
      document.querySelector('.slides-container').addEventListener('click', function(e) {
        const rect = e.currentTarget.getBoundingClientRect();
        const clickX = e.clientX - rect.left;
        const width = rect.width;

        if (clickX > width * 0.6) {
          // 点击右侧 - 下一页
          if (currentIndex < totalSlides - 1) {
            currentIndex++;
            showSlide(currentIndex);
          }
        } else if (clickX < width * 0.4) {
          // 点击左侧 - 上一页
          if (currentIndex > 0) {
            currentIndex--;
            showSlide(currentIndex);
          }
        }
      });

      // 键盘左右键切换
      document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
          if (currentIndex < totalSlides - 1) {
            currentIndex++;
            showSlide(currentIndex);
          }
        } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
          if (currentIndex > 0) {
            currentIndex--;
            showSlide(currentIndex);
          }
        }
      });
    })();
  </script>
</body>
</html>
