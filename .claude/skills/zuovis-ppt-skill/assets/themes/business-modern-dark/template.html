<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TITLE}}</title>

  <!-- 图表库 -->
  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>

  <!-- Squircle 圆角 (figma-squircle) -->
  <script type="module">
    import { getSvgPath } from 'https://cdn.jsdelivr.net/npm/figma-squircle@1/+esm';
    window.__applySquircle = () => {
      const sel = '.glass-card, .data-card, .chart-chart-card, .timeline-card, .feature-card, .quote-block';
      document.querySelectorAll(sel).forEach(el => {
        const r = parseFloat(getComputedStyle(el).borderRadius) || 30;
        el.style.clipPath = `path('${getSvgPath({
          width: el.clientWidth, height: el.clientHeight,
          cornerRadius: Math.min(r, el.clientWidth/3, el.clientHeight/3),
          cornerSmoothing: 1, preserveSmoothing: true
        })}')`;
      });
    };
  </script>

  <!-- 内联 animate.css 关键帧 -->
  <style>
    @keyframes fadeInDown{from{opacity:0;transform:translate3d(0,-40px,0)}to{opacity:1;transform:translate3d(0,0,0)}}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    @keyframes fadeInUp{from{opacity:0;transform:translate3d(0,40px,0)}to{opacity:1;transform:translate3d(0,0,0)}}
    @keyframes zoomIn{from{opacity:0;transform:scale3d(.3,.3,.3)}50%{opacity:1}}
    .animate__animated{animation-duration:.6s;animation-fill-mode:both}
    .animate__fadeInDown{animation-name:fadeInDown}.animate__fadeIn{animation-name:fadeIn;animation-duration:.8s}
    .animate__fadeInUp{animation-name:fadeInUp}.animate__zoomIn{animation-name:zoomIn}
  </style>

  <!-- 主题样式 -->
  <style>
    {{THEME_STYLE}}
  </style>
</head>
<body>
  <!-- SVG定义clip-path - 特点对比页卡片凹陷 -->
  <svg width="0" height="0" style="position:absolute;">
    <defs>
      <!-- 左卡片裁剪路径 -->
      <clipPath id="left-card-clip" clipPathUnits="objectBoundingBox">
        <path d="
          M 0.0625 0
          L 0.9375 0
          Q 1 0, 1 0.0625
          L 1 0.34
          C 1 0.37, 0.965 0.41, 0.958 0.45
          A 0.042 0.08 0 0 0 0.958 0.55
          C 0.965 0.59, 1 0.63, 1 0.66
          L 1 0.9375
          Q 1 1, 0.9375 1
          L 0.0625 1
          Q 0 1, 0 0.9375
          L 0 0.0625
          Q 0 0, 0.0625 0
          Z
        "/>
      </clipPath>

      <!-- 右卡片裁剪路径 -->
      <clipPath id="right-card-clip" clipPathUnits="objectBoundingBox">
        <path d="
          M 0.9375 0
          Q 1 0, 1 0.0625
          L 1 0.9375
          Q 1 1, 0.9375 1
          L 0.0625 1
          Q 0 1, 0 0.9375
          L 0 0.66
          C 0 0.63, 0.035 0.59, 0.042 0.55
          A 0.042 0.08 0 0 0 0.042 0.45
          C 0.035 0.41, 0 0.37, 0 0.34
          L 0 0.0625
          Q 0 0, 0.0625 0
          Z
        "/>
      </clipPath>
    </defs>
  </svg>

  <div class="webgl-background"></div>

  <div class="slides-container">
    {{SLIDES_CONTENT}}
  </div>

  <script>
    // 图表配置
    {{CHART_CONFIG}}

    // 幻灯片导航
    (function() {
      const slides = document.querySelectorAll('.slide');
      let currentIndex = 0;
      const totalSlides = slides.length;

      function showSlide(index) {
        slides.forEach((slide, i) => {
          slide.classList.remove('active');
          if (i === index) {
            slide.classList.add('active');
            // 触发动画重播
            const animatedElements = slide.querySelectorAll('.animate__animated');
            animatedElements.forEach(el => {
              el.style.animation = 'none';
              el.offsetHeight; // 触发重排
              el.style.animation = null;
            });
          }
        });
      }

      // 初始化显示第一页
      showSlide(0);

      // 点击导航
      document.querySelector('.slides-container').addEventListener('click', function(e) {
        const rect = e.currentTarget.getBoundingClientRect();
        const clickX = e.clientX - rect.left;
        const width = rect.width;

        if (clickX > width * 0.6) {
          // 点击右侧 - 下一页
          if (currentIndex < totalSlides - 1) {
            currentIndex++;
            showSlide(currentIndex);
          }
        } else if (clickX < width * 0.4) {
          // 点击左侧 - 上一页
          if (currentIndex > 0) {
            currentIndex--;
            showSlide(currentIndex);
          }
        }
      });

      // 键盘左右键切换
      document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
          if (currentIndex < totalSlides - 1) {
            currentIndex++;
            showSlide(currentIndex);
          }
        } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
          if (currentIndex > 0) {
            currentIndex--;
            showSlide(currentIndex);
          }
        }
      });

      // 数字动画
      function animateNumber(element, target, duration = 1500) {
        const start = 0;
        const startTime = performance.now();
        const isDecimal = target < 100 && target % 1 !== 0;

        function update(currentTime) {
          const elapsed = currentTime - startTime;
          const progress = Math.min(elapsed / duration, 1);
          const easeProgress = 1 - Math.pow(1 - progress, 3); // easeOutCubic
          const current = start + (target - start) * easeProgress;

          if (isDecimal) {
            element.textContent = current.toFixed(1);
          } else {
            element.textContent = Math.floor(current).toLocaleString();
          }

          if (progress < 1) {
            requestAnimationFrame(update);
          }
        }

        requestAnimationFrame(update);
      }

      // 初始化图表
      function initCharts() {
        {{CHART_INIT}}
      }

      // 页面加载完成后初始化
      document.addEventListener('DOMContentLoaded', function() {
        initCharts();

        // Squircle 圆角
        if (window.__applySquircle) window.__applySquircle();

        // 初始化数字动画
        document.querySelectorAll('.data-value[data-target]').forEach(el => {
          const target = parseFloat(el.dataset.target);
          animateNumber(el, target);
        });
      });
    })();
  </script>
</body>
</html>
